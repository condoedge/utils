name: Auto-Generate Translations

on:
  push:
    branches:
      - '**'  # Run on all branches
    paths:
      - '**/*.php'
      - '**/*.blade.php'
      - '**/*.vue'
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.ts'
      - '**/*.tsx'
      - '!.github/**'
      - '!public/js/**'
      - '!public/build/**'
      - '!node_modules/**'
      - '!vendor/**'

  workflow_dispatch:  # Allow manual trigger
    inputs:
      base_ref:
        description: 'Optional base ref/SHA for changed-file detection'
        required: false
        default: ''
      head_ref:
        description: 'Optional head ref/SHA for changed-file detection'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-translations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect changed source files
        id: changed-files
        run: |
          set -euo pipefail

          CHANGED_FILES_RAW="$RUNNER_TEMP/changed-files.raw"
          CHANGED_FILES_TXT="$RUNNER_TEMP/changed-files.txt"

          BASE_REF="${{ github.event.inputs.base_ref }}"
          HEAD_REF="${{ github.event.inputs.head_ref }}"

          if [ -z "$HEAD_REF" ]; then
            HEAD_REF="${GITHUB_SHA}"
          fi

          if [ -z "$BASE_REF" ]; then
            if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ] && ! echo "${{ github.event.before }}" | grep -q '^0*$'; then
              BASE_REF="${{ github.event.before }}"
            else
              BASE_REF="$(git rev-parse "${HEAD_REF}^" 2>/dev/null || true)"
            fi
          fi

          if [ -n "$BASE_REF" ]; then
            git diff --name-only "$BASE_REF" "$HEAD_REF" > "$CHANGED_FILES_RAW"
          else
            git diff --name-only HEAD > "$CHANGED_FILES_RAW"
          fi

          grep -E '\.(php|blade\.php|vue|js|jsx|ts|tsx)$' "$CHANGED_FILES_RAW" \
            | grep -Ev '^(\.github|public/js|public/build|node_modules|vendor|resources/lang)/' \
            > "$CHANGED_FILES_TXT" || true

          COUNT="$(wc -l < "$CHANGED_FILES_TXT" | tr -d ' ')"
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "base_ref=$BASE_REF" >> $GITHUB_OUTPUT
          echo "head_ref=$HEAD_REF" >> $GITHUB_OUTPUT
          echo "changed_files_path=$CHANGED_FILES_TXT" >> $GITHUB_OUTPUT
          echo "Changed source files: $COUNT"
          cat "$CHANGED_FILES_TXT"

      - name: Generate translations with Claude
        if: steps.changed-files.outputs.count > 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node .github/scripts/generate-translations.js --changed-files-file "${{ steps.changed-files.outputs.changed_files_path }}"

      - name: Check for changes
        id: check-changes
        if: steps.changed-files.outputs.count > 0
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No translation changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Translation changes detected"
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Auto-finalize temporary translation keys

            Finalized translate.* keys using Claude AI and changed-file context.

            - Analyzed ${{ steps.changed-files.outputs.count }} changed source files
            - Updated source keys plus English/French translations where needed

            Please review the translations for accuracy and context appropriateness.
          branch: auto-translate-${{ github.ref_name }}-${{ github.sha }}
          delete-branch: true
          title: 'Auto-finalize translations for `${{ github.ref_name }}`'
          body: |
            ## Automated Translation Finalization

            This PR was automatically generated by the translation workflow.

            ### Summary
            - **Base branch**: `${{ github.ref_name }}`
            - **Changed source files analyzed**: ${{ steps.changed-files.outputs.count }}
            - **Diff base**: `${{ steps.changed-files.outputs.base_ref }}`
            - **Diff head**: `${{ steps.changed-files.outputs.head_ref }}`

            ### What was done

            1. Read the full changed source files from the current commit range
            2. Found temporary keys with the `translate.` prefix
            3. Used Claude AI to:
               - infer the best final key namespace from code context
               - reuse matching existing translations when possible
               - replace source usages of `translate.*`
               - add English/French translations for new final keys

            ### Review Required

            Please review the generated translations to ensure:
            - [ ] Temporary `translate.*` keys were replaced with good final keys
            - [ ] Translations are accurate and contextually appropriate
            - [ ] Tone and style match the application's language
            - [ ] Technical terms are correctly translated
            - [ ] No placeholders (e.g., "TODO:") remain

            ### How to test

            1. Check out this branch
            2. Review source key replacements and `resources/lang/en.json` / `resources/lang/fr.json`
            3. Test the affected UI elements in both languages
            4. Make any necessary adjustments

            ---

            *Generated with Claude Code*
          labels: |
            auto-generated
            translations
            needs-review
          assignees: ${{ github.actor }}
          draft: false

      - name: Summary
        if: always()
        run: |
          echo "## Translation Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Changed source files analyzed**: ${{ steps.changed-files.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes made**: ${{ steps.check-changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check-changes.outputs.has_changes }}" = "true" ]; then
            echo "- **Status**: PR created with finalized translations" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.changed-files.outputs.count }}" = "0" ]; then
            echo "- **Status**: No changed source files found" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: No translate.* keys found or no changes generated" >> $GITHUB_STEP_SUMMARY
          fi
